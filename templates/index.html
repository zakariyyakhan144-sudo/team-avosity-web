<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Avosity | Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --avosity-blue: #00d4ff; 
            --deep-blue: #0045cc;
            --bg-pure: #000000;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg-pure); color: white; 
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; 
        }

        /* Animated Mesh Background */
        .main-wrapper {
            height: 100vh; width: 100vw;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.1) 0%, rgba(0,0,0,1) 70%);
            display: flex; flex-direction: column; align-items: center;
        }

        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('/static/banner.jpg');
            background-size: cover; background-position: center;
            z-index: -1;
        }

        /* Nav Bar - Cyber Style */
        .navbar {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            width: 100%; border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding: 15px 0; z-index: 100;
        }

        .nav-btn {
            background: none; border: none; color: white;
            font-weight: 700; text-transform: uppercase; letter-spacing: 3px;
            margin: 0 25px; cursor: pointer; transition: 0.4s;
            position: relative;
        }

        .nav-btn.active::after {
            content: ''; position: absolute; bottom: -20px; left: 0; width: 100%; height: 3px;
            background: var(--avosity-blue); box-shadow: 0 0 15px var(--avosity-blue);
        }

        .nav-btn.active, .nav-btn:hover { color: var(--avosity-blue); opacity: 1; }

        /* Content Area */
        .content-area {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; z-index: 10;
        }

        .page-section { display: none; text-align: center; width: 100%; animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page-section.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        /* ELITE CARD SYSTEM */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 50px 30px; 
            position: relative; overflow: hidden;
            transition: 0.5s;
        }

        /* The Animated Border Beam */
        .glass-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--avosity-blue));
            animation: rotate 4s linear infinite; z-index: -1;
        }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .card-inner {
            background: #0a0a0a; border-radius: 13px;
            height: 100%; width: 100%; padding: 40px 20px;
        }

        .glass-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
        }

        .btn-avosity {
            background: transparent; color: var(--avosity-blue); 
            border: 2px solid var(--avosity-blue);
            font-weight: 700; border-radius: 4px; padding: 12px 30px;
            text-decoration: none; display: inline-block;
            transition: 0.3s; margin-top: 20px;
        }

        .btn-avosity:hover { background: var(--avosity-blue); color: black; box-shadow: 0 0 20px var(--avosity-blue); }

        .soon { font-size: 6rem; font-weight: 700; letter-spacing: 20px; opacity: 0.1; color: white; }
        
        h1 { font-size: clamp(4rem, 15vw, 7rem); font-weight: 700; letter-spacing: 20px; margin-bottom: 0;
             background: linear-gradient(to right, #fff, var(--avosity-blue), #fff);
             background-size: 200% auto; animation: shine 4s linear infinite;
             -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @keyframes shine { to { background-position: 200% center; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="bg-banner"></div>
        
        <nav class="navbar">
            <div class="container d-flex justify-content-center">
                <button class="nav-btn active" onclick="showPage('home')">Home</button>
                <button class="nav-btn" onclick="showPage('merch')">Merch</button>
                <button class="nav-btn" onclick="showPage('socials')">Socials</button>
            </div>
        </nav>

        <div class="content-area">
            <div id="home" class="page-section active">
                <img src="/static/logo.png" width="160" style="filter: drop-shadow(0 0 20px var(--avosity-blue))" class="mb-4">
                <h1>AVOSITY</h1>
                <p class="opacity-50" style="letter-spacing: 10px; font-size: 1.2rem;">THE FUTURE OF COMPETITIVE GAMING</p>
            </div>

            <div id="merch" class="page-section">
                <div class="soon">SOON</div>
            </div>

            <div id="socials" class="page-section">
                <div class="container">
                    <div class="row g-4 justify-content-center">
                        <div class="col-md-3">
                            <div class="glass-card">
                                <div class="card-inner">
                                    <i class="fab fa-discord fa-4x mb-4" style="color: var(--avosity-blue);"></i>
                                    <h3 class="letter-spacing-2">DISCORD</h3>
                                    <a href="YOUR_LINK" class="btn-avosity">CONNECT</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="glass-card">
                                <div class="card-inner">
                                    <i class="fab fa-x-twitter fa-4x mb-4" style="color: var(--avosity-blue);"></i>
                                    <h3>TWITTER</h3>
                                    <a href="YOUR_LINK" class="btn-avosity">FOLLOW</a>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="glass-card">
                                <div class="card-inner">
                                    <i class="fab fa-youtube fa-4x mb-4" style="color: var(--avosity-blue);"></i>
                                    <h3>YOUTUBE</h3>
                                    <a href="YOUR_LINK" class="btn-avosity">SUBSCRIBE</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === pageId) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
