<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVOSITY | THE NEW STANDARD</title>
    
    <!-- Core Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&family=Inter:wght@900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { 
            --avosity-blue: #00d4ff; 
            --deep-blue: #0045cc;
            --bg-black: #050505;
            --surface: rgba(15, 15, 15, 0.7);
            --discord: #5865F2;
            --tiktok: #ff0050;
            --glow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        /* T1 Layout Reset */
        * { cursor: crosshair !important; }
        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--bg-black);
            color: #fff; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            letter-spacing: 0.5px;
        }

        /* Dynamic Background Layer */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #050505 100%);
        }

        /* Global Neon Scanline */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.2;
        }

        /* --- NAVIGATION --- */
        .navbar {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 20px 0;
            z-index: 1000;
        }
        .navbar-brand { 
            font-family: 'Inter', sans-serif;
            font-weight: 900; 
            font-size: 2rem;
            background: linear-gradient(to right, #fff, var(--avosity-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6) !important;
            transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .nav-link:hover { color: var(--avosity-blue) !important; transform: translateY(-2px); }

        /* --- HERO --- */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .hero-content { position: relative; z-index: 10; }
        .hero h1 {
            font-size: clamp(5rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 0.8;
            margin: 0;
            text-transform: uppercase;
            filter: drop-shadow(0 0 50px rgba(0, 212, 255, 0.3));
        }
        .hero-sub {
            font-size: 1rem;
            letter-spacing: 15px;
            color: var(--avosity-blue);
            font-weight: 700;
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* --- GAMES SECTION --- */
        .section-title {
            font-size: 4rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 50px;
            background: linear-gradient(transparent, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .game-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 0; /* Sharp T1 design */
            position: relative;
            overflow: hidden;
            transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .game-card:hover {
            border-color: var(--avosity-blue);
            transform: scale(1.02);
            box-shadow: var(--glow);
        }
        .game-img {
            height: 500px;
            background-size: cover;
            background-position: center;
            filter: grayscale(40%);
            transition: 0.6s;
        }
        .game-card:hover .game-img { filter: grayscale(0%); transform: scale(1.1); }
        .game-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            padding: 40px;
            background: linear-gradient(to top, #000, transparent);
        }
        .game-title { font-weight: 800; font-size: 2.5rem; margin: 0; text-transform: uppercase; }

        /* --- COMMUNITY --- */
        .cta-box {
            padding: 100px 50px;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            border: 1px solid rgba(0, 212, 255, 0.2);
            position: relative;
        }
        .social-link {
            font-size: 3.5rem;
            color: #222;
            transition: 0.5s;
            text-decoration: none;
        }
        .discord-h:hover { color: var(--discord); filter: drop-shadow(0 0 30px var(--discord)); transform: rotate(-5deg) scale(1.2); }
        .twitter-h:hover { color: #fff; filter: drop-shadow(0 0 30px #fff); transform: rotate(5deg) scale(1.2); }
        .tiktok-h:hover { color: var(--tiktok); filter: drop-shadow(0 0 30px var(--tiktok)); transform: rotate(-5deg) scale(1.2); }
        .youtube-h:hover { color: #ff0000; filter: drop-shadow(0 0 30px #ff0000); transform: rotate(5deg) scale(1.2); }

        /* --- BUTTONS --- */
        .btn-avosity {
            padding: 20px 50px;
            background: #fff;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }
        .btn-avosity:hover {
            background: var(--avosity-blue);
            transform: skewX(-5deg);
            box-shadow: var(--glow);
        }

        footer {
            padding: 100px 0 50px;
            border-top: 1px solid rgba(255,255,255,0.05);
            background: #000;
        }
    </style>
</head>
<body>

                <div class="game-card">

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });

        // T1 STARFIELD ENGINE
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Mouse Interaction
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < 150) {
                    this.x -= dx/20;
                    this.y -= dy/20;
                }

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 212, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
