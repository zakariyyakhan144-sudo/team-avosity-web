<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Avosity | Official</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --avosity-blue: #00d4ff; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; }
        
        /* Hero Banner */
        .hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('/static/banner.jpg');
            background-size: cover;
            background-position: center;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }

        .logo {
            width: 120px; border-radius: 50%; 
            border: 3px solid var(--avosity-blue);
            box-shadow: 0 0 20px var(--avosity-blue);
        }

        /* Social Cards */
        .social-card {
            background: #151515;
            border: 1px solid #222;
            border-radius: 15px;
            padding: 30px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            display: block;
        }

        .social-card:hover {
            transform: translateY(-10px);
            border-color: var(--avosity-blue);
            background: #1f1f1f;
            color: var(--avosity-blue);
        }

        .discord-btn {
            background-color: #5865F2;
            color: white; border-radius: 8px;
            padding: 15px 40px; font-weight: bold;
            text-decoration: none; display: inline-block;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="container">
            <img src="/static/logo.png" class="logo mb-3" alt="Avosity Logo">
            <h1 class="display-1 fw-bold">TEAM AVOSITY</h1>
            <p class="text-uppercase tracking-widest">The Future of Competitive Gaming</p>
        </div>
    </section>

    <div class="container my-5 py-5">
        <div class="row g-4 text-center">
            <div class="col-md-6">
                <a href="YOUR_DISCORD_LINK" class="social-card">
                    <i class="fab fa-discord fa-3x mb-3"></i>
                    <h3>Join Discord</h3>
                    <p class="text-muted">Chat with the team and get tryout info.</p>
                </a>
            </div>
            <div class="col-md-6">
                <a href="YOUR_SOCIAL_LINK" class="social-card">
                    <i class="fab fa-x-twitter fa-3x mb-3"></i>
                    <h3>Follow our Socials</h3>
                    <p class="text-muted">See our latest clips and announcements.</p>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
