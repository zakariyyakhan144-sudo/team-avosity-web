<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVOSITY | SUPREME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --avosity-blue: #00d4ff; 
            --avosity-glow: rgba(0, 212, 255, 0.5);
            --bg-black: #020202;
        }

        body, html { 
            margin: 0; padding: 0; min-height: 100vh; width: 100vw;
            background: var(--bg-black); color: white; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* CINEMATIC BACKGROUND SYSTEM */
        .main-wrapper {
            min-height: 100vh; width: 100vw;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #050505 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center;
        }

        .energy-mesh {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 10%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 136, 255, 0.05) 0%, transparent 40%);
            z-index: 0; filter: blur(50px);
            animation: pulseBg 10s ease-in-out infinite alternate;
        }

        @keyframes pulseBg {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* SUPREME NAVIGATION */
        .navbar {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 0; z-index: 1000;
        }

        .nav-link-custom {
            background: none; border: none; color: white;
            font-weight: 700; text-transform: uppercase; letter-spacing: 5px;
            margin: 0 40px; cursor: pointer; transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0.3; font-size: 1.1rem;
        }

        .nav-link-custom.active, .nav-link-custom:hover { 
            opacity: 1; color: var(--avosity-blue); 
            text-shadow: 0 0 25px var(--avosity-blue);
            transform: translateY(-2px);
        }

        /* CONTENT ENGINE */
        .content-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; z-index: 10; padding: 60px 20px; }
        .page-section { display: none; text-align: center; width: 100%; max-width: 1400px; }
        .page-section.active { display: block; animation: entryAnim 1s cubic-bezier(0.19, 1, 0.22, 1); }

        @keyframes entryAnim {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); filter: blur(20px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        /* THE SOVEREIGN CARDS */
        .sovereign-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px; position: relative; overflow: hidden;
            transition: 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .sovereign-card::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 212, 255, 0.1) 0%, transparent 60%);
            opacity: 0; transition: opacity 0.5s;
        }

        .sovereign-card:hover {
            transform: translateY(-25px) scale(1.03);
            border-color: var(--avosity-blue);
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 212, 255, 0.2);
        }

        .sovereign-card:hover::after { opacity: 1; }

        .card-inner {
            background: rgba(0,0,0,0.8); border-radius: 28px; margin: 2px; padding: 70px 30px;
            z-index: 1; position: relative;
        }

        /* TYPOGRAPHY ART */
        h1 { 
            font-size: clamp(4rem, 20vw, 10rem); font-weight: 700; letter-spacing: 30px; margin: 0;
            background: linear-gradient(to bottom, #fff 20%, var(--avosity-blue) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 50px rgba(0, 212, 255, 0.4));
            text-transform: uppercase;
        }

        .hero-desc {
            max-width: 850px; margin: 50px auto; font-size: 1.5rem; 
            letter-spacing: 3px; line-height: 2; opacity: 0.6;
            font-weight: 500; border-left: 2px solid var(--avosity-blue);
            padding-left: 30px; text-align: left;
        }

        .ghost-text {
            font-size: clamp(5rem, 15vw, 12rem); font-weight: 700; letter-spacing: 50px; 
            color: rgba(255, 255, 255, 0.02); pointer-events: none;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .navbar { padding: 15px 0; }
            .nav-link-custom { margin: 0 10px; font-size: 0.7rem; letter-spacing: 2px; }
            h1 { letter-spacing: 10px; }
            .hero-desc { font-size: 1rem; padding-left: 15px; text-align: center; border-left: none; border-top: 1px solid var(--avosity-blue); padding-top: 20px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper" id="scene">
        <div class="energy-mesh"></div>
        
        <nav class="navbar">
            <div class="container d-flex justify-content-center">
                <button class="nav-link-custom active" onclick="showPage('home')">Home</button>
                <button class="nav-link-custom" onclick="showPage('merch')">Merch</button>
                <button class="nav-link-custom" onclick="showPage('socials')">Socials</button>
            </div>
        </nav>

        <div class="content-area">
            <div id="home" class="page-section active">
                <img src="/static/logo.png" width="220" style="filter: drop-shadow(0 0 60px var(--avosity-blue)); animation: float 6s ease-in-out infinite;" class="mb-5">
                <h1>AVOSITY</h1>
                <div class="hero-desc">
                    We are more than a team. We are the vanguard of competitive gaming. 
                    Specializing in <strong>Rocket League</strong> and <strong>Fortnite</strong>, 
                    Avosity is dedicated to precision, dominance, and the pursuit of absolute victory.
                </div>
            </div>

            <div id="merch" class="page-section">
                <div class="ghost-text">LEGACY</div>
                <h2 style="font-size: 4rem; letter-spacing: 20px; opacity: 0.5;">COMING SOON</h2>
            </div>

            <div id="socials" class="page-section">
                <div class="container">
                    <div class="row g-5 justify-content-center">
                        <div class="col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-discord fa-5x mb-4" style="color: var(--avosity-blue);"></i>
                                    <h4 class="text-white letter-spacing-5">DISCORD</h4>
                                </div></div>
                            </a>
                        </div>
                        <div class="col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-x-twitter fa-5x mb-4" style="color: var(--avosity-blue);"></i>
                                    <h4 class="text-white letter-spacing-5">TWITTER</h4>
                                </div></div>
                            </a>
                        </div>
                        <div class="col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-youtube fa-5x mb-4" style="color: var(--avosity-blue);"></i>
                                    <h4 class="text-white letter-spacing-5">YOUTUBE</h4>
                                </div></div>
                            </a>
                        </div>
                        <div class="col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-tiktok fa-5x mb-4" style="color: var(--avosity-blue);"></i>
                                    <h4 class="text-white letter-spacing-5">TIKTOK</h4>
                                </div></div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Smooth Section Switching
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link-custom').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === 'origin' && pageId === 'home') btn.classList.add('active');
                if(btn.innerText.toLowerCase() === 'armoury' && pageId === 'merch') btn.classList.add('active');
                if(btn.innerText.toLowerCase() === 'nexus' && pageId === 'socials') btn.classList.add('active');
            });
        }

        // Mouse Tracker for Cards
        document.querySelectorAll('.sovereign-card').forEach(card => {
            card.addEventListener('mousemove', e => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / card.clientWidth) * 100;
                const y = ((e.clientY - rect.top) / card.clientHeight) * 100;
                card.style.setProperty('--mouse-x', `${x}%`);
                card.style.setProperty('--mouse-y', `${y}%`);
            });
        });
    </script>
</body>
</html>
