<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Avosity | Premier Esports</title>
    
    <!-- Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { 
            --avosity-blue: #00d4ff; 
            --deep-blue: #0045cc;
            --bg-black: #060606;
            --card-bg: rgba(20, 20, 20, 0.6);
            --tiktok: #ff0050;
        }

        html { scroll-behavior: smooth; }

        body { 
            background-color: var(--bg-black);
            color: white; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        /* --- GLOW EFFECTS --- */
        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .glow-orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
            z-index: -2;
            filter: blur(80px);
            pointer-events: none;
            animation: floatGlow 20s infinite alternate;
        }

        .orb-1 { top: -10%; left: -10%; }
        .orb-2 { bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(0, 69, 204, 0.15) 0%, transparent 70%); }

        @keyframes floatGlow {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 50px); }
        }

        /* --- NAVBAR --- */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand { font-weight: 800; letter-spacing: 2px; color: var(--avosity-blue) !important; }
        .nav-link {
            color: rgba(255,255,255,0.7) !important;
            font-weight: 700;
            text-transform: uppercase;
            margin: 0 15px;
            transition: 0.3s;
        }
        .nav-link:hover { color: var(--avosity-blue) !important; text-shadow: 0 0 10px var(--avosity-blue); }

        /* --- HERO --- */
        .hero {
            height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }
        .hero-watermark {
            position: absolute;
            font-size: 25vw;
            font-weight: 900;
            color: rgba(0, 212, 255, 0.03);
            z-index: -1;
            user-select: none;
        }
        .hero h1 {
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 800;
            letter-spacing: 20px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        /* --- GAME CARDS --- */
        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.5s ease;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            height: 100%;
        }
        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--avosity-blue);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2);
        }
        .game-img {
            height: 400px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 25px;
            position: relative;
        }
        .game-img::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .game-card h4 { position: relative; z-index: 2; font-weight: 800; letter-spacing: 2px; }

        /* --- CTA / COMMUNITY --- */
        .cta-box {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid var(--avosity-blue);
            border-radius: 30px;
            padding: 60px;
            backdrop-filter: blur(10px);
        }

        /* --- BUTTONS --- */
        .btn-avosity {
            background: var(--avosity-blue);
            color: #000;
            font-weight: 800;
            padding: 15px 45px;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
            transition: 0.3s;
        }
        .btn-avosity:hover { background: white; transform: scale(1.05); color: #000; }

        /* --- SOCIALS --- */
        .social-link {
            color: rgba(255, 255, 255, 0.6);
            font-size: 2.2rem;
            transition: 0.3s;
        }
        .social-link:hover { transform: translateY(-5px); color: var(--avosity-blue); }

        footer {
            background: rgba(0, 0, 0, 0.9);
            padding: 80px 0 30px;
            border-top: 1px solid rgba(0, 212, 255, 0.2);
        }
    </style>
</head>
<body>

    <!-- Dynamic Particle Background -->
    <div id="tsparticles"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">AVOSITY</a>
            <div class="navbar-nav ms-auto d-none d-lg-flex">
                <a class="nav-link" href="#games">Rosters</a>
                <a class="nav-link" href="#community">Community</a>
                <a class="nav-link" href="https://discord.gg/DUFS9GZ3AU" target="_blank">Discord</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-watermark">AVOSITY</div>
        <div class="container" data-aos="zoom-in">
            <h1>AVOSITY</h1>
            <p class="lead mb-5" style="letter-spacing: 10px;">PREMIER ESPORTS | EST. 2026</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="#games" class="btn-avosity">View Ranks</a>
                <a href="https://discord.gg/DUFS9GZ3AU" target="_blank" class="btn btn-outline-light px-5 py-3 fw-bold">JOIN DISCORD</a>
            </div>
        </div>
    </section>

    <section id="games" class="container py-5">
        <div class="text-center mb-5" data-aos="fade-up">
            <h2 class="fw-bold display-4">ELITE ROSTERS</h2>
            <div style="width: 80px; height: 4px; background: var(--avosity-blue); margin: 10px auto;"></div>
        </div>
        <div class="row g-4">
            <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
                <div class="game-card">
                    <div class="game-img" style="background-image: url('https://m.media-amazon.com/images/M/MV5BZDUwZGZlZGUtOTA5NC00YjM4LTk1ZGEtN2JjMWI3MDkxODc0XkEyXkFqcGc@._V1_.jpg');">
                        <h4>ROCKET LEAGUE</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
                <div class="game-card">
                    <div class="game-img" style="background-image: url('https://m.media-amazon.com/images/M/MV5BMTZlMmIxM2EtN2Y4Zi00M2ZhLTk3NzgtNjJmZTU0MTQ3YjcwXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg');">
                        <h4>FORTNITE</h4>
                    </div>
                </div>
            </div>
            <div class="col-md-4" data-aos="fade-up" data-aos-delay="300">
                <div class="game-card">
                    <div class="game-img" style="background-image: url('https://cdn.displate.com/artwork/857x1200/2023-06-12/6e217abc7f5bb5d0dc56e68752193a11_5c51574f5f2f216f9ef25a0d08fa6400.jpg');">
                        <h4>CS2</h4>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="community" class="container py-5">
        <div class="cta-box text-center" data-aos="flip-up">
            <h2 class="display-5 fw-bold mb-4">JOIN THE COMMUNITY</h2>
            <div class="d-flex justify-content-center gap-5 mb-5">
                <a href="https://discord.gg/DUFS9GZ3AU" target="_blank" class="social-link"><i class="fab fa-discord"></i></a>
                <a href="https://x.com/TeamAvosity" target="_blank" class="social-link"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.tiktok.com/@teamavosity" target="_blank" class="social-link"><i class="fab fa-tiktok"></i></a>
                <a href="https://www.youtube.com/@Team.Avosity" target="_blank" class="social-link"><i class="fab fa-youtube"></i></a>
            </div>
            <a href="https://discord.gg/DUFS9GZ3AU" target="_blank" class="btn-avosity">Connect on Discord</a>
        </div>
    </section>

    <footer>
        <div class="container text-center">
            <h4 class="fw-bold mb-4" style="color: var(--avosity-blue);">AVOSITY</h4>
            <p class="text-muted small">© 2026 TEAM AVOSITY. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/preset-stars@2/tsparticles.preset.stars.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    
    <script>
        AOS.init({ duration: 1000, once: true });

        // Particle Configuration
        tsParticles.load("tsparticles", {
            particles: {
                number: { value: 80 },
                color: { value: "#00d4ff" },
                shape: { type: "circle" },
                opacity: { value: 0.3 },
                size: { value: 2 },
                move: {
                    enable: true,
                    speed: 1,
                    direction: "none",
                    outModes: { default: "out" }
                },
                links: {
                    enable: true,
                    distance: 150,
                    color: "#00d4ff",
                    opacity: 0.2,
                    width: 1
                }
            },
            interactivity: {
                events: {
                    onHover: { enable: true, mode: "grab" },
                    onClick: { enable: true, mode: "push" }
                }
            }
        });
    </script>
</body>
</html>
