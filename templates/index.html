<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Avosity | Official</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --avosity-blue: #00d4ff; 
            --dark-bg: #050505; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--dark-bg); 
            color: white; 
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }
        
        /* Hero Banner with Parallax-ish feel */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(5,5,5,1)), url('/static/banner.jpg');
            background-size: cover;
            background-position: center;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            border-bottom: 2px solid var(--glass-border);
        }

        .logo {
            width: 140px; 
            border-radius: 50%; 
            border: 3px solid var(--avosity-blue);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            transition: transform 0.5s ease;
        }

        .logo:hover {
            transform: scale(1.1) rotate(5deg);
        }

        h1 {
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, var(--avosity-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 15px;
        }

        .hero p {
            letter-spacing: 8px;
            font-weight: 500;
            opacity: 0.8;
            color: var(--avosity-blue);
        }

        /* Glass Cards */
        .social-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .social-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .social-card:hover::before {
            left: 100%;
        }

        .social-card:hover {
            transform: translateY(-15px);
            border-color: var(--avosity-blue);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.2);
            color: white;
        }

        .social-card i {
            font-size: 4rem;
            margin-bottom: 20px;
            transition: 0.3s ease;
        }

        .social-card:hover i {
            transform: scale(1.2);
            text-shadow: 0 0 20px var(--avosity-blue);
        }

        .social-card h3 {
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .text-muted {
            color: rgba(255,255,255,0.5) !important;
        }

    </style>
</head>
<body>

    <section class="hero">
        <div class="container">
            <img src="/static/logo.png" class="logo mb-3" alt="Avosity Logo">
            <h1 class="display-2">TEAM AVOSITY</h1>
            <p class="text-uppercase">The Future of Competitive Gaming</p>
        </div>
    </section>

    <div class="container my-5 py-5">
        <div class="row g-5 text-center justify-content-center">
            <div class="col-md-5">
                <a href="https://discord.gg/DUFS9GZ3AU" target="_blank" class="social-card">
                    <i class="fab fa-discord" style="color: #5865F2;"></i>
                    <h3>Join Discord</h3>
                    <p class="text-muted">Chat with the team and get tryout info.</p>
                </a>
            </div>
            
            <div class="col-md-5">
                <a href="PASTE_SOCIALS_LINK_HERE" target="_blank" class="social-card">
                    <i class="fab fa-x-twitter"></i>
                    <h3>Follow Socials</h3>
                    <p class="text-muted">See our latest clips and announcements.</p>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
