<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVOSITY | SUPREME</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --avosity-blue: #00d4ff; 
            --deep-blue: #0045cc;
            --bg-black: #000000;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg-black); color: white; 
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; 
        }

        /* DYNAMIC ENERGY BACKGROUND */
        .main-wrapper {
            height: 100vh; width: 100vw;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #080808 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* ENERGY BEAMS IN BACKGROUND */
        .liquid-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 60%);
            filter: blur(60px); animation: pulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes pulse { from { opacity: 0.4; transform: scale(1); } to { opacity: 0.8; transform: scale(1.2); } }

        /* NAV BAR */
        .navbar {
            background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px);
            width: 100%; border-bottom: 1px solid rgba(0, 212, 255, 0.15);
            padding: 20px 0; z-index: 100;
        }
        .nav-btn {
            background: none; border: none; color: white;
            font-weight: 700; text-transform: uppercase; letter-spacing: 4px;
            margin: 0 30px; cursor: pointer; transition: 0.4s; opacity: 0.4;
        }
        .nav-btn.active, .nav-btn:hover { opacity: 1; color: var(--avosity-blue); text-shadow: 0 0 15px var(--avosity-blue); }

        /* CONTENT ENGINE */
        .content-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; z-index: 10; padding: 20px; }
        .page-section { display: none; text-align: center; width: 100%; max-width: 1300px; animation: entry 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
        .page-section.active { display: block; }
        @keyframes entry { from { opacity: 0; transform: translateY(30px); filter: blur(10px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }

        /* HOME LAYOUT OVERHAUL */
        .hero-grid { display: grid; grid-template-columns: 1fr; gap: 20px; align-items: center; }

        /* BEAM LOGO TEXT */
        .beam-title {
            font-size: clamp(3.5rem, 15vw, 9rem); font-weight: 700; letter-spacing: 20px;
            position: relative; color: #111; /* Dark Blue base */
            text-transform: uppercase; margin-bottom: 0;
            background: linear-gradient(90deg, #001a33, #0045cc, #001a33);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .beam-title::before {
            content: 'AVOSITY'; position: absolute; left: 0; top: 0; width: 100%;
            background: linear-gradient(90deg, transparent, var(--avosity-blue), transparent);
            background-size: 200% 100%; animation: beamMove 3s linear infinite;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            z-index: 2; filter: drop-shadow(0 0 15px var(--avosity-blue));
        }
        @keyframes beamMove { 0% { background-position: -200% 0%; } 100% { background-position: 200% 0%; } }

        .about-terminal {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 15px; padding: 30px; max-width: 700px; margin: 30px auto;
            text-align: left; position: relative; overflow: hidden;
        }
        .about-terminal::before { content: 'SYSTEM STATUS: ONLINE'; position: absolute; top: 10px; right: 15px; font-size: 0.6rem; color: var(--avosity-blue); opacity: 0.5; }

        /* SOCIAL CARDS (GLOW RESTORED) */
        .sovereign-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; position: relative; overflow: hidden; transition: 0.5s; z-index: 1;
        }
        .sovereign-card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--avosity-blue), transparent);
            animation: rotate 4s linear infinite; z-index: -1;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .card-inner { background: #000; border-radius: 22px; margin: 3px; padding: 60px 20px; z-index: 2; position: relative; }
        .sovereign-card:hover { transform: translateY(-15px); border-color: var(--avosity-blue); box-shadow: 0 0 50px rgba(0, 212, 255, 0.4); }

        /* MOBILE FIX */
        @media (max-width: 768px) {
            .navbar { padding: 15px 0; }
            .nav-btn { margin: 0 10px; font-size: 0.7rem; }
            .beam-title { letter-spacing: 8px; }
            .about-terminal { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="liquid-bg"></div>
        
        <nav class="navbar">
            <div class="container d-flex justify-content-center">
                <button class="nav-btn active" onclick="showPage('home')">Home</button>
                <button class="nav-btn" onclick="showPage('merch')">Merch</button>
                <button class="nav-btn" onclick="showPage('socials')">Socials</button>
            </div>
        </nav>

        <div class="content-area">
            <div id="home" class="page-section active">
                <div class="hero-grid">
                    <img src="/static/logo.png" width="150" style="filter: drop-shadow(0 0 30px var(--avosity-blue));" class="mx-auto mb-2">
                    <h1 class="beam-title">AVOSITY</h1>
                    <div class="about-terminal">
                        <p style="color: var(--avosity-blue); font-weight: 700; margin-bottom: 5px;">[ ABOUT_US ]</p>
                        <p class="opacity-75 mb-0">We are a premier Esports organization. Domination is our standard. Specializing in <strong>Rocket League</strong> and <strong>Fortnite</strong>, we illuminate the path to victory.</p>
                    </div>
                </div>
            </div>

            <div id="merch" class="page-section">
                <div style="font-size: 6rem; font-weight: 700; letter-spacing: 30px; opacity: 0.05;">SOON</div>
            </div>

            <div id="socials" class="page-section">
                <div class="container">
                    <div class="row g-4 justify-content-center">
                        <div class="col-6 col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-discord fa-3x mb-3" style="color: var(--avosity-blue);"></i>
                                    <h5 class="text-white">DISCORD</h5>
                                </div></div>
                            </a>
                        </div>
                        <div class="col-6 col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-x-twitter fa-3x mb-3" style="color: var(--avosity-blue);"></i>
                                    <h5 class="text-white">TWITTER</h5>
                                </div></div>
                            </a>
                        </div>
                        <div class="col-6 col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-youtube fa-3x mb-3" style="color: var(--avosity-blue);"></i>
                                    <h5 class="text-white">YOUTUBE</h5>
                                </div></div>
                            </a>
                        </div>
                        <div class="col-6 col-md-3">
                            <a href="YOUR_LINK" class="text-decoration-none">
                                <div class="sovereign-card"><div class="card-inner">
                                    <i class="fab fa-tiktok fa-3x mb-3" style="color: var(--avosity-blue);"></i>
                                    <h5 class="text-white">TIKTOK</h5>
                                </div></div>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === pageId) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
